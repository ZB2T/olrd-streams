<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>OLRD — Control</title>
    <link rel="icon" type="image/x-icon" href="assets/logo.ico">
    <link rel="shortcut icon" href="assets/logo.ico">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <link rel="preconnect" href="https://edbabpxwtxkllakfnnhu.supabase.co" crossorigin>
    <link rel="preload" href="css/fonts.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="css/fonts.css"></noscript>
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/admin.css">
    <script src="js/i18n.js"></script>
    <script defer src="js/guard.js"></script>
</head>
<body class="admin-page" data-admin="login">
    <div class="fog"></div>
    <div class="grain"></div>

    <div id="admin-root">
        <section id="admin-login" class="admin-gate">
            <div class="gate-card cut">
                <img class="gate-card__crest" src="assets/logo.png" alt="OLRD">
                <h1 class="gate-card__title" data-i18n="admin.title">Control</h1>
                <p class="gate-card__sub" data-i18n="admin.subtitle">OLRD Management Console</p>
                <form id="login-form" autocomplete="off">
                    <input type="password" id="login-pass" class="field" data-i18n-ph="admin.accessKey" placeholder="Access Key" autocomplete="current-password" spellcheck="false">
                    <button type="submit" id="login-submit" class="btn" data-i18n="admin.authorise">Authorise</button>
                </form>
                <div id="login-msg" class="form-msg gate-card__msg"></div>
                <div class="gate-hint" data-i18n="admin.hint">Authorised Personnel Only · Sessions End When This Tab Closes</div>
                <a href="home" class="gate-back" data-i18n="admin.backHome">← Home</a>
            </div>
        </section>
    </div>

    <script src="js/atmosphere.js"></script>
    <script src="js/config.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/seed.js"></script>
    <script src="js/store.js"></script>
    <script src="js/security.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/brand.js"></script>
</body>
</html>
