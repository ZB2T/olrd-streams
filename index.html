<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLRD STREAMS | LIVE</title>
    <style>
        :root {
            --main-red: #ff0000;
            --bg-black: #080808;
            --panel-grey: #121212;
            --text-white: #ffffff;
        }

        body { 
            background-color: var(--bg-black); 
            color: var(--text-white); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الهيدر باسم OLRD STREAMS */
        header { 
            width: 100%;
            background-color: #000; 
            padding: 40px 0; 
            text-align: center;
            border-bottom: 3px solid var(--main-red);
            box-shadow: 0 5px 20px rgba(255, 0, 0, 0.15);
        }

        .brand-name {
            font-size: 45px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
        }

        .brand-name span {
            color: var(--main-red);
        }

        /* الحاوية الرئيسية للهوية */
        .main-wrapper { 
            width: 90%;
            max-width: 1200px; 
            margin-top: 40px;
            padding: 20px;
            border: 1px solid #1a1a1a;
            background: var(--panel-grey);
            border-radius: 15px;
        }

        /* إطار الفيديو */
        .video-frame {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #222;
        }

        .video-frame iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* قسم القنوات */
        .channels-header {
            margin-top: 40px;
            font-size: 22px;
            font-weight: bold;
            color: var(--text-white);
            border-right: 5px solid var(--main-red);
            padding-right: 15px;
            text-align: right;
        }

        .channels-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
            margin-top: 25px;
            margin-bottom: 50px;
        }

        /* تصميم الأزرار - أحمر وأبيض */
        .btn-stream { 
            background: transparent; 
            border: 2px solid var(--main-red); 
            color: var(--text-white
