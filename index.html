<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLRD STREAMS | LIVE</title>
    <style>
        :root { --main-red: #ff0000; --bg-black: #080808; }
        body { background-color: var(--bg-black); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        header { width: 100%; position: absolute; top: 0; padding: 20px 0; text-align: center; border-bottom: 2px solid var(--main-red); background: #000; }
        .brand { font-size: 28px; font-weight: 900; }
        .brand span { color: var(--main-red); }
        .video-wrapper { width: 90%; max-width: 900px; border: 2px solid #222; border-radius: 15px; overflow: hidden; box-shadow: 0 0 30px rgba(255, 0, 0, 0.2); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <div class="brand">OLRD <span>STREAMS</span></div>
</header>

<div class="video-wrapper">
    <div class="video-container">
        <iframe 
            src="https://player.kick.com/yzfk?muted=false&autoplay=true&parent=olrd-streams.pages.dev" 
            allowfullscreen="true">
        </iframe>
    </div>
</div>

</body>
</html>
