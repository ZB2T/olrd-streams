<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>OLRD STREAMERS | OFFICIAL PLATFORM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=700;900&family=Montserrat:wght=400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        html, body, *, a, button {
            cursor: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij48cGF0aCBkPSJNNC41IDIuMjV2MTcuMjE4bDQuNDkzLTQuMzIxIDMuMjMyIDcuMTAzIDMuMDEyLTEuMzcxLTMuMjYyLTcuMDQyIDUuNTI1LjAxM3ptMS41IDIuNjUxbDExLjAxIDEwLjMzNC0zLjc5MS0uMDEgMy4yNDIgNi45OTYtMS41MDMuNjg0LTMuMjIxLTcuMDYtMi43NDUgMi42Mzd6IiBmaWxsPSIjYjMyNDI0Ii8+PC9zdmc+') 0 0, auto !important;
        }

        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; 
            overflow-x: hidden; 
        }

        .bg { position: fixed; top: -100%; left: -100%; width: 300%; height: 300%; background: url('bg.jpg') repeat; background-size: 350px; opacity: 0.12; z-index: -1; animation: rotateBg 60s linear infinite; }
        @keyframes rotateBg { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1, .splash-text, .selection-title, .category-box, .admin-title { font-family: 'Cinzel', serif; }
        
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #b32424; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d42c2c; }

        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 1; transition: opacity 1s ease-in-out; }
        .splash-text { font-size: 3.5rem; font-weight: 900; letter-spacing: 6px; color: #fff; animation: fadeIn 1.5s ease-in-out forwards; }
        .splash-text span { color: #b32424; }
        @keyframes fadeIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        
        #main-selection { display: none; height: 100vh; justify-content: center; align-items: center; flex-direction: column; opacity: 0; transition: opacity 1s ease-in-out; position: relative; }
        .selection-title { font-size: 28px; margin-bottom: 40px; letter-spacing: 4px; color: #aaa; font-weight: 700; }
        .categories-container { display: flex; gap: 40px; width: 90%; max-width: 1200px; justify-content: center; }
        .category-box { flex: 1; aspect-ratio: 1 / 1; max-width: 400px; background: rgba(10, 10, 10, 0.85); border: 2px solid #222; border-radius: 20px; display: flex; justify-content: center; align-items: center; font-size: 2.2rem; font-weight: 900; letter-spacing: 3px; cursor: pointer; transition: 0.4s ease; text-decoration: none; color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .category-box:hover { border-color: #b32424; transform: translateY(-10px) scale(1.03); box-shadow: 0 0 30px rgba(179, 36, 36, 0.25); background: rgba(15, 5, 5, 0.9); }
        .category-box span { color: #b32424; margin-left: 5px; }
        
        #streamers-section, #story-section { display: none; padding-bottom: 50px; }
        header { padding: 25px; background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(179, 36, 36, 0.35); margin-bottom: 40px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo { width: 75px; margin-bottom: 8px; }
        .header-controls { position: absolute; top: 50%; transform: translateY(-50%); right: 5%; display: flex; gap: 10px; }
        
        .nav-btn { background: rgba(20, 20, 20, 0.6); border: 1px solid #333; color: #ccc; padding: 8px 22px; border-radius: 6px; cursor: pointer; transition: 0.3s ease; font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; font-size: 11px; }
        .nav-btn:hover { background: #b32424; border-color: #b32424; color: #fff; box-shadow: 0 0 15px rgba(179, 36, 36, 0.35); }
        .nav-btn.edit-trigger { background: rgba(255, 255, 255, 0.02); border-color: #222; color: #111; }
        .nav-btn.edit-trigger:hover { background: #111; border-color: #b32424; color: #fff; box-shadow: none; }
        
        .container { width: 95%; max-width: 1600px; margin: 0 auto; }
        .live-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-bottom: 40px; }
        
        .card-link { text-decoration: none; display: block; position: relative; overflow: hidden; border-radius: 12px; }
        
        .mouse-guard {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            background: rgba(0, 0, 0, 0);
            pointer-events: auto;
        }
        
        .card { position: relative; background: #000; border: 1px solid #222; border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .card-link:hover .card { border-color: #b32424; transform: scale(1.02); }
        
        .v-wrap { position: relative; padding-bottom: 56.25%; height: 0; background: #111; }
        
        .red-offline-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #120202 0%, #2b0505 100%);
            border: 1px solid rgba(179, 36, 36, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            z-index: 2;
        }

        .red-offline-box {
            background: rgba(179, 36, 36, 0.15);
            border: 1px solid #b32424;
            padding: 10px 20px;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1.5px;
            box-shadow: 0 0 15px rgba(179, 36, 36, 0.2);
        }

        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; pointer-events: none; z-index: 1; }
        
        .card-info { position: absolute; bottom: 0; left: 0; width: 100%; box-sizing: border-box; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 10; }
        .user-name { font-weight: 700; font-size: 13px; text-transform: uppercase; color: #ffffff !important; text-decoration: none !important; letter-spacing: 1px; }
        
        .live-tag { color: #b32424; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 5px; letter-spacing: 1px; }
        .live-tag::before { content: ''; width: 8px; height: 8px; background: #b32424; border-radius: 50%; box-shadow: 0 0 8px #b32424; }
        
        .footer-credit { margin: 40px auto 15px auto; width: fit-content; min-width: 250px; padding: 12px 35px; background: rgba(179, 36, 36, 0.06); border: 1px solid rgba(179, 36, 36, 0.35); border-radius: 8px; font-weight: bold; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: #fff; }
        
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 1400px; height: 85vh; background: #0a0a0a; border: 2px solid #b32424; border-radius: 20px; z-index: 10000; padding: 30px; box-shadow: 0 0 50px rgba(0,0,0,0.95); overflow-y: auto; box-sizing: border-box; }
        .admin-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index: 9999; }
        .admin-title { text-align: center; color: #b32424; font-size: 24px; margin-bottom: 25px; letter-spacing: 3px; font-weight: 900; }
        .admin-input-group { display: flex; gap: 15px; margin-bottom: 30px; max-width: 600px; margin-left: auto; margin-right: auto; }
        .admin-input { flex: 1; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; font-family: sans-serif; }
        .admin-btn { background: #b32424; color: #fff; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        .admin-btn.close { background: #222; border: 1px solid #444; margin-top: 30px; width: 100%; max-width: 300px; display: block; margin-left: auto; margin-right: auto; }
        .admin-btn.close:hover { background: #b32424; border-color: #b32424; }
        
        .admin-grid-manager { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; list-style: none; padding: 0; margin: 0; }
        .admin-card-item { position: relative; background: #111; border: 2px dashed #333; border-radius: 12px; aspect-ratio: 16 / 9; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .admin-card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; padding: 10px; box-sizing: border-box; }
        .admin-user-name { font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .admin-delete-btn { background: rgba(179, 36, 36, 0.2); border: 1px solid #b32424; color: #b32424; padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; padding: 6px 16px; text-transform: uppercase; transition: 0.2s; }
        .admin-delete-btn:hover { background: #b32424; color: #fff; }
        .sortable-ghost { opacity: 0.4; border-color: #b32424; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div id="splash-screen"><div class="splash-text">WELCOME TO <span>OLRD STREAMERS</span></div></div>
    <div id="main-selection">
        <div class="selection-title">SELECT CATEGORY</div>
        <div class="categories-container">
            <div class="category-box" onclick="showSection('streamers')">STREAMERS</div>
            <div class="category-box" onclick="showSection('story')">STORY <span>BOOK</span></div>
        </div>
        <div class="footer-credit">CREATED BY ZB2T</div>
    </div>
    <div id="streamers-section">
        <header>
            <div class="header-controls">
                <button class="nav-btn edit-trigger" onclick="checkAdminPassword()">Edit</button>
                <button class="nav-btn" onclick="showSelectionPage()">Back</button>
            </div>
            <img src="logo.png" class="logo">
            <h1 style="margin:0;">OLRD <span style="color:#b32424">STREAMERS</span></h1>
        </header>
        <div class="container"><div id="main-grid" class="live-grid"></div></div>
    </div>
    <div id="story-section">
        <header>
            <div class="header-controls"><button class="nav-btn" onclick="showSelectionPage()">Back</button></div>
            <img src="logo.png" class="logo"><h1 style="margin:0;">STORY <span style="color:#b32424">BOOK</span></h1>
        </header>
        <div class="container" style="padding-top: 100px;">
            <h2 style="font-size: 2.5rem; letter-spacing: 2px; font-family: 'Cinzel', serif;">STORY BOOK SECTION</h2>
            <p style="color: #666; font-size: 1.2rem; letter-spacing: 1px;">COMING SOON.. ARCHIVING THE FINEST SERVER LORE.</p>
        </div>
    </div>
    
    <div class="admin-overlay" id="admin-overlay" onclick="toggleAdminPanel(false)"></div>
    <div id="admin-panel">
        <div class="admin-title">OLRD VISUAL MANAGEMENT PANEL</div>
        <div class="admin-input-group">
            <input type="text" id="new-streamer-input" class="admin-input" placeholder="Enter Kick username">
            <button class="admin-btn" onclick="addStreamer()">Insert</button>
        </div>
        <ul class="admin-grid-manager" id="manager-list"></ul>
        <button class="admin-btn close" onclick="toggleAdminPanel(false)">Exit Panel</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABdmqw08cPnLhyEBA5oVDlO54pJKqOeWE",
            authDomain: "olrd-streamers.firebaseapp.com",
            databaseURL: "https://olrd-streamers-default-rtdb.firebaseio.com",
            projectId: "olrd-streamers",
            storageBucket: "olrd-streamers.firebasestorage.app",
            messagingSenderId: "59629556786",
            appId: "1:59629556786:web:67496cbb25b9b2d64582b"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const streamersRef = database.ref('streamers_list');

        let users = [];
        let isFullyLoaded = false;
        const host = window.location.hostname;
        const grid = document.getElementById('main-grid');
        let sortableInstance = null;

        streamersRef.on('value', (snapshot) => {
            const data = snapshot.val();
            users = data || [];
            renderGrid();
            if (document.getElementById('admin-panel').style.display === 'block') renderAdminList();
        });

        function renderGrid() {
            grid.innerHTML = "";
            users.forEach(u => {
                const iframeHTML = isFullyLoaded 
                    ? `<iframe src="https://player.kick.com/${u}?muted=true&parent=${host}" allowfullscreen="true" scrolling="no" loading="lazy"></iframe>`
                    : ``;

                const placeholderHTML = `<div class="red-offline-placeholder"><div class="red-offline-box">${u.toUpperCase()} IS OFFLINE</div></div>`;

                grid.innerHTML += `
                    <a href="https://kick.com/${u}" target="_blank" class="card-link">
                        <div class="mouse-guard"></div>
                        <div class="card">
                            <div class="v-wrap">
                                ${placeholderHTML}
                                ${iframeHTML}
                            </div>
                            <div class="card-info">
                                <div class="live-tag">STATUS</div>
                                <div class="user-name">${u}</div>
                            </div>
                        </div>
                    </a>`;
            });
        }

        function renderAdminList() {
            const list = document.getElementById('manager-list');
            list.innerHTML = "";
            users.forEach((u, index) => {
                list.innerHTML += `
                    <li class="admin-card-item" data-index="${index}">
                        <div class="admin-card-overlay">
                            <span class="admin-user-name">${u}</span>
                            <button class="admin-delete-btn" onclick="deleteStreamer(${index}); event.stopPropagation();">Remove</button>
                        </div>
                    </li>`;
            });

            if (sortableInstance) {
                sortableInstance.destroy();
            }

            sortableInstance = new Sortable(list, {
                animation: 250,
                ghostClass: 'sortable-ghost',
                onEnd: function () {
                    const updatedUsers = [];
                    const items = list.querySelectorAll('.admin-card-item');
                    items.forEach(item => {
                        const oldIndex = parseInt(item.getAttribute('data-index'));
                        updatedUsers.push(users[oldIndex]);
                    });
                    users = updatedUsers;
                    streamersRef.set(users);
                }
            });
        }

        function checkAdminPassword() {
            const password = prompt("ENTER SYSTEM PIN SECURITY TO ACCESS PREFERENCES:");
            if (password) {
                database.ref('admin_secure_vault/' + password).once('value')
                .then((snapshot) => {
                    if (snapshot.exists() && snapshot.val() === true) {
                        toggleAdminPanel(true);
                    } else {
                        alert("ACCESS DENIED: INVALID SECURITY PIN.");
                    }
                })
                .catch((error) => {
                    alert("ACCESS DENIED: INVALID SECURITY PIN.");
                });
            }
        }

        function toggleAdminPanel(show) {
            document.getElementById('admin-panel').style.display = show ? 'block' : 'none';
            document.getElementById('admin-overlay').style.display = show ? 'block' : 'none';
            if (show) renderAdminList();
        }

        function addStreamer() {
            const input = document.getElementById('new-streamer-input');
            const name = input.value.trim();
            if(name) { users.unshift(name); input.value = ""; streamersRef.set(users); }
        }

        function deleteStreamer(index) {
            if(confirm("Are you sure?")) { users.splice(index, 1); streamersRef.set(users); }
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const selection = document.getElementById('main-selection');
                splash.style.opacity = '0';
                setTimeout(() => { 
                    splash.style.display = 'none'; 
                    selection.style.display = 'flex'; 
                    setTimeout(() => { 
                        selection.style.opacity = '1'; 
                        isFullyLoaded = true; 
                        renderGrid(); 
                    }, 50); 
                }, 1000);
            }, 3000);
        });

        function showSection(section) {
            document.getElementById('main-selection').style.display = 'none';
            if(section === 'streamers') document.getElementById('streamers-section').style.display = 'block';
            else if(section === 'story') document.getElementById('story-section').style.display = 'block';
        }

        function showSelectionPage() {
            document.getElementById('streamers-section').style.display = 'none';
            document.getElementById('story-section').style.display = 'none';
            const selection = document.getElementById('main-selection');
            selection.style.display = 'flex'; selection.style.opacity = '1';
        }
    </script>
</body>
</html>
