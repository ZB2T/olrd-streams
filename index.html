<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OLRD LIVE | مباشر</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('bg.jpg') no-repeat center center/cover; opacity: 0.1; z-index: -1; }
        header { padding: 15px; background: #000; border-bottom: 2px solid red; position: sticky; top: 0; z-index: 100; }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .live-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #0a0a0a; border: 1px solid #333; border-radius: 8px; overflow: hidden; position: relative; }
        .card.active { border-color: red; box-shadow: 0 0 10px red; }
        iframe { width: 100%; aspect-ratio: 16/9; border: 0; }
        .status-tag { position: absolute; top: 10px; right: 10px; background: red; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .loading { font-size: 18px; color: #666; margin: 50px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <header><h1>OLRD <span style="color:red">LIVE</span></h1></header>
    <div class="container">
        <div id="loading-msg" class="loading">جاري الفحص السريع لـ 48 قناة...</div>
        <div id="live-area" class="live-grid"></div>
    </div>

    <script>
        const users = ["lkaiiser", "evely3", "kurd1i", "yzfk", "ngdi", "d7m1-s", "iwdd", "y_3l", "ialfa", "ROMEO", "abo3th", "shanks_u", "Zb2t", "z7lion", "alarwilii", "teek0", "d4t4xi", "kr0m", "mrfarosyy", "irust", "omutx", "lunedee", "saraalnamlah", "abosaloum", "qyem", "0xcharlie", "ykoy", "fed0tb", "hitanchi", "itsenemyy", "yaasoky", "imsh4", "9lb6h", "seba0z", "nas_24", "25sniperksa", "22rahaf", "xlive1", "berlin26x", "v0lka", "qtrm7md", "gyg2", "bnshddad", "0md1", "nolizr", "aizen56", "mr20s", "ii2a"];
        const domain = "olrd-streams.pages.dev";

        async function checkChannel(u) {
            try {
                // نستخدم بروكسي عالي السرعة
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://kick.com/api/v1/channels/'+u)}&t=${Date.now()}`);
                const data = JSON.parse((await res.json()).contents);
                
                if (data.livestream) {
                    document.getElementById('loading-msg').style.display = 'none';
                    const area = document.getElementById('live-area');
                    area.innerHTML += `
                        <div class="card active">
                            <span class="status-tag">مباشر الآن</span>
                            <iframe src="https://player.kick.com/${u}?muted=true&parent=${domain}"></iframe>
                            <div style="padding:10px; font-weight:bold;">${u.toUpperCase()}</div>
                        </div>`;
                }
            } catch (e) {}
        }

        // السرعة هنا: نشغل الفحص لـ 48 قناة في نفس الثانية
        Promise.all(users.map(u => checkChannel(u))).then(() => {
            const area = document.getElementById('live-area');
            if (area.innerHTML === "") {
                document.getElementById('loading-msg').innerHTML = "لا يوجد أحد مباشر حالياً 😴";
            }
        });
    </script>
</body>
</html>
