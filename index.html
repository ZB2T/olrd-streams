<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OLRD STREAMS | LIVE</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('bg.jpg') no-repeat center center/cover; opacity: 0.15; z-index: -1; }
        header { padding: 30px; background: rgba(0,0,0,0.9); border-bottom: 2px solid red; margin-bottom: 30px; }
        .logo { width: 80px; margin-bottom: 10px; }
        .container { width: 95%; max-width: 1600px; margin: 0 auto; padding-bottom: 50px; }
        
        /* شبكة عرض القنوات كاملة */
        .live-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: #0a0a0a; border: 1px solid #333; border-radius: 8px; overflow: hidden; position: relative; }
        
        /* إطار الفيديو */
        .v-wrap { position: relative; padding-bottom: 56.25%; height: 0; background: #111; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        /* معلومات القناة أسفل الفيديو */
        .card-info { padding: 12px; display: flex; justify-content: space-between; align-items: center; background: #050505; }
        .user-name { font-weight: bold; font-size: 14px; text-transform: uppercase; color: #ccc; }
        .live-status { color: #00ff00; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .live-status::before { content: ''; width: 8px; height: 8px; background: #00ff00; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <header>
        <img src="logo.png" class="logo">
        <h1 style="margin:0; font-size: 22px;">OLRD <span style="color:red">STREAMS</span></h1>
    </header>

    <div class="container">
        <div id="main-grid" class="live-grid">
            </div>
    </div>

    <script>
        // قائمة الـ 48 قناة كاملة
        const users = ["lkaiiser", "evely3", "kurd1i", "yzfk", "ngdi", "d7m1-s", "iwdd", "y_3l", "ialfa", "ROMEO", "abo3th", "shanks_u", "Zb2t", "z7lion", "alarwilii", "teek0", "d4t4xi", "kr0m", "mrfarosyy", "irust", "omutx", "lunedee", "saraalnamlah", "abosaloum", "qyem", "0xcharlie", "ykoy", "fed0tb", "hitanchi", "itsenemyy", "yaasoky", "imsh4", "9lb6h", "seba0z", "nas_24", "25sniperksa", "22rahaf", "xlive1", "berlin26x", "v0lka", "qtrm7md", "gyg2", "bnshddad", "0md1", "nolizr", "aizen56", "mr20s", "ii2a"];
        const domain = "olrd-streams.pages.dev";
        const grid = document.getElementById('main-grid');

        // توليد البطاقات لجميع القنوات دفعة واحدة
        users.sort().forEach(u => {
            grid.innerHTML += `
                <div class="card" id="card-${u}">
                    <div class="v-wrap">
                        <iframe src="https://player.kick.com/${u}?muted=true&parent=${domain}"></iframe>
                    </div>
                    <div class="card-info">
                        <div class="live-status">LIVE</div>
                        <div class="user-name">${u}</div>
                    </div>
                </div>`;
        });
    </script>
</body>
</html>
