<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLRD STREAMS | LIVE</title>
    <style>
        :root { --main-red: #ff0000; --card-bg: rgba(10, 10, 10, 0.9); }
        
        body { 
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #000; color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center;
        }

        /* خلفية التنين السوداء */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bg.jpg'); 
            background-size: cover; background-position: center;
            opacity: 0.3; filter: blur(2px); z-index: -1;
        }
        
        header { 
            width: 100%; padding: 20px 0; background: rgba(0,0,0,0.95); 
            border-bottom: 3px solid var(--main-red); margin-bottom: 30px;
        }
        .logo { width: 100px; height: auto; margin-bottom: 10px; }
        .brand { font-size: 30px; font-weight: 900; }
        .brand span { color: var(--main-red); }

        .container { width: 96%; max-width: 1200px; margin: 0 auto; padding-bottom: 50px; }
        
        .streams-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
        }
        
        .video-card { 
            background: var(--card-bg); border: 1px solid #333; 
            border-radius: 12px; overflow: hidden; transition: 0.3s;
        }
        .video-card:hover { border-color: var(--main-red); }
        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #111; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .channel-info { 
            padding: 12px; background: #000; 
            display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 14px;
        }
        .live-tag { color: #00ff00; }

        /* تنسيق خاص للقناة الخامسة لتتوسط الصف */
        .video-card:last-child:nth-child(odd) {
            grid-column: 1 / span 2;
            width: 60%;
            margin: 0 auto;
        }

        @media (max-width: 800px) {
            .streams-grid { grid-template-columns: 1fr; }
            .video-card:last-child:nth-child(odd) { width: 100%; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<header>
    <img src="logo.png" alt="OLRD" class="logo" onerror="this.style.display='none'">
    <div class="brand">OLRD <span>STREAMS</span></div>
</header>

<div class="container">
    <div class="streams-grid">
