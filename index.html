<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OLRD SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        #admin-panel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 600px; background: #050505; border: 1px solid #333;
            border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 1000;
        }
        .streamer-manager-list {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px; list-style: none; padding: 0; margin-top: 20px;
        }
        .streamer-item {
            background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 10px;
            cursor: grab; display: flex; flex-direction: column; align-items: center;
        }
        .streamer-item:active { cursor: grabbing; }
        .delete-btn {
            background: #200505; color: #ff4d4d; border: 1px solid #551111;
            padding: 5px 10px; border-radius: 4px; margin-top: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>OLRD STREAMERS</h1>
    <ul id="streamer-list"></ul>
    <button onclick="checkAdminPassword()">EDIT</button>

    <div id="admin-panel">
        <h3>SYSTEM PREFERENCES</h3>
        <input type="text" id="new-name" placeholder="Streamer Name">
        <button onclick="addStreamer()">INSERT</button>
        <ul id="manager-list" class="streamer-manager-list"></ul>
        <button onclick="toggleAdminPanel(false)" style="margin-top:20px;">EXIT</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://olrd-streamers-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let users = [];

        database.ref('streamers_list').on('value', (snapshot) => {
            users = snapshot.val() || [];
            renderMainList();
            if(document.getElementById('admin-panel').style.display === 'block') renderAdminList();
        });

        function renderMainList() {
            document.getElementById('streamer-list').innerHTML = users.map(u => `<li>${u}</li>`).join('');
        }

        function checkAdminPassword() {
            const pin = prompt("ENTER SYSTEM PIN:");
            if (!pin) return;
            database.ref('admin_secure_vault/' + pin).once('value').then(s => {
                if(s.exists() && s.val() === true) toggleAdminPanel(true);
                else alert("ACCESS DENIED");
            });
        }

        function toggleAdminPanel(show) {
            document.getElementById('admin-panel').style.display = show ? 'block' : 'none';
            if(show) renderAdminList();
        }

        function renderAdminList() {
            const list = document.getElementById('manager-list');
            list.innerHTML = users.map((u, i) => `
                <li class="streamer-item" data-id="${i}">
                    <span>${u}</span>
                    <button class="delete-btn" onclick="del(${i})">DELETE</button>
                </li>`).join('');
            
            new Sortable(list, {
                onEnd: function (evt) {
                    const item = users.splice(evt.oldIndex, 1)[0];
                    users.splice(evt.newIndex, 0, item);
                    save();
                }
            });
        }

        function addStreamer() {
            const input = document.getElementById('new-name');
            if(input.value) { users.push(input.value); input.value = ''; save(); }
        }

        function del(i) { users.splice(i, 1); save(); }
        function save() { database.ref('streamers_list').set(users); }
    </script>
</body>
</html>
