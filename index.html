<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLRD STREAMS | LIVE</title>
    <style>
        :root { --main-red: #ff0000; --bg-grey: #0a0a0a; --card-bg: #1a1a1a; }
        body { background-color: var(--bg-grey); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        
        header { width: 100%; padding: 25px 0; text-align: center; background: #000; border-bottom: 2px solid var(--main-red); }
        /* الشعار برابط خارجي لضمان الظهور */
        .logo { width: 130px; height: auto; filter: drop-shadow(0 0 15px rgba(255,0,0,0.6)); margin-bottom: 10px; }
        .brand { font-size: 38px; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        .brand span { color: var(--main-red); }
        
        .container { width: 95%; max-width: 1100px; margin: 0 auto; }
        .featured-section { margin-top: 30px; text-align: center; }
        .section-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; color: #fff; }
        .live-dot { width: 12px; height: 12px; background: red; border-radius: 50%; animation: blink 1s infinite; }
        
        .main-stream { background: #000; border: 2px solid var(--main-red); border-radius: 15px; overflow: hidden; box-shadow: 0 0 25px rgba(255,0,0,0.3); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .grid-section { margin-top: 50px; }
        .channels-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 20px; }
        .channel-card { background: var(--card-bg); border-radius: 10px; padding: 15px; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .channel-card:hover { border-color: var(--main-red); transform: scale(1.02); }
        .channel-name { font-size: 18px; font-weight: bold; }
        .status-badge { padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; }
        .status-online { background: rgba(0, 255, 0, 0.1); color: #00ff00; border: 1px solid #00ff00; }
        .status-offline { background: rgba(255, 255, 255, 0.05); color: #888; border: 1px solid #444; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/C3m00Ysh/2ku5y-LC-2026-03-19-T05-49-12-110-Z.png" alt="OLRD Logo" class="logo">
    <div class="brand">OLRD <span>STREAMS</span></div>
</header>

<div class="container">
    <div class="featured-section">
        <div class="section-title"><span class="live-dot"></span> البث المباشر الحالي</div>
        <div class="main-stream">
            <div class="video-container">
                <iframe src="https://player.kick.com/yzfk?muted=true&autoplay=true&parent=olrd-streams.pages.dev" allowfullscreen="true"></iframe>
            </div>
        </div>
    </div>

    <div class="grid-section">
        <div class="section-title">قائمة القنوات</div>
        <div class="channels-grid">
            <div class="channel-card"><span class="channel-name">YZFK</span><span class="status-badge status-online">ON LIVE</span></div>
            <div class="channel-card"><span class="channel-name">NGDI</span><span class="status-badge status-online">ON LIVE</span></div>
            <div class="channel-card"><span class="channel-name">ROMEO</span><span class="status-badge status-offline">OFFLINE</span></div>
            <div class="channel-card"><span class="channel-name">LKAIISER</span><span class="status-badge status-offline">OFFLINE</span></div>
        </div>
    </div>
</div>

</body>
</html>
