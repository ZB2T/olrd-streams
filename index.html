<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLRD STREAMS | LIVE</title>
    <style>
        :root { --main-red: #ff0000; --card-bg: rgba(15, 15, 15, 0.95); }
        
        body { 
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #000; color: white;
            font-family: 'Segoe UI', sans-serif; text-align: center;
        }

        /* خلفية التنين السوداء */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bg.jpg'); 
            background-size: cover; background-position: center;
            opacity: 0.35; filter: blur(2px); z-index: -1;
        }
        
        header { 
            width: 100%; padding: 25px 0; background: rgba(0,0,0,0.9); 
            border-bottom: 3px solid var(--main-red); margin-bottom: 40px;
        }
        .logo { width: 110px; height: auto; }
        .brand { font-size: 35px; font-weight: 900; margin-top: 10px; }
        .brand span { color: var(--main-red); }

        .container { width: 95%; max-width: 1200px; margin: 0 auto; }
        
        /* نظام الشبكة: 2 في كل صف */
        .streams-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px; padding-bottom: 60px;
        }
        
        .video-card { 
            background: var(--card-bg); border: 2px solid #333; 
            border-radius: 15px; overflow: hidden; transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .video-card:hover { border-color: var(--main-red); transform: translateY(-5px); }
