<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLRD STREAMS | LIVE</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-bottom: 50px; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('bg.jpg') no-repeat center center/cover; opacity: 0.15; z-index: -1; }
        header { padding: 30px; background: #000; border-bottom: 3px solid red; margin-bottom: 30px; }
        .logo { width: 80px; margin-bottom: 10px; }
        .container { width: 95%; max-width: 1600px; margin: 0 auto; }
        .live-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card-link { text-decoration: none; color: inherit; display: block; }
        .card { background: #0a0a0a; border: 1px solid #222; border-radius: 10px; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: red; transform: scale(1.02); }
        .v-wrap { position: relative; padding-bottom: 56.25%; height: 0; background: #111; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .card-info { padding: 12px; display: flex; justify-content: space-between; align-items: center; background: #050505; }
        .user-name { font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .live-tag { color: #00ff00; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .live-tag::before { content: ''; width: 8px; height: 8px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 5px #00ff00; }

        .footer-credit {
            margin: 40px auto 10px auto;
            width: fit-content;
            min-width: 250px;
            padding: 15px 40px;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid red;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
        }

        .zidan-signature-wrap {
            width: fit-content;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 11px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sig-z {
            font-family: 'Brush Script MT', cursive, serif;
            font-size: 22px;
            color: red;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <header>
        <img src="logo.png" class="logo">
        <h1 style="margin:0;">OLRD <span style="color:red">STREAMS</span></h1>
    </header>

    <div class="container">
        <div id="main-grid" class="live-grid"></div>
        
        <div class="footer-section">
            <div class="footer-credit">CREATED BY ZB2T</div>
            <div class="zidan-signature-wrap">
                Zidan's signature: <span class="sig-z">Z</span>
            </div>
        </div>
    </div>

    <script>
        // القائمة النهائية مع العضو الجديد iitalal7
        const users = [
            "ii2a", "qyem", "fed0tb", "shanks_u", "evely3", "lkaiiser", "d4t4xi", "kurd1i", 
            "ialfa", "irust", "lunedee", "ROMEO", "z7lion", "saraalnamlah", "mrfarosyy", "yzfk", 
            "Zb2t", "abosaloum", "ngdi", "abo3th", "nolizr", "iitalal7", "kr0m", "seba0z", "teek0", 
            "iwdd", "y_3li", "d7m1-s", "yaasoky", "imsh4", "0xcharlie", "25sniperksa", "22rahaf", 
            "0md1", "hitanchi", "9lb6h", "elbulldozer", "berlin26x", "gyg2", "mr20s", "aizen56", 
            "iicloud", "alarwilii", "icq50", "xlive1", "nas_24", "ithanos", "alahmady03", "ykoy", 
            "itsenemyy", "iiw2le", "omutx", "v0lka", "qtrm7md", "1nxe", "bnshddad"
        ];
        
        const host = window.location.hostname;
        const grid = document.getElementById('main-grid');

        users.forEach(u => {
            grid.innerHTML += `
                <div class="card-link">
                    <div class="card">
                        <div class="v-wrap">
                            <iframe 
                                src="https://player.kick.com/${u}?muted=true&parent=${host}" 
                                allowfullscreen="true"
                                scrolling="no"

                        </div>

        });

</body>
</html>
