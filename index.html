<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLRD STREAMS | LIVE</title>
    <style>
        :root { --main-red: #ff0000; --card-bg: rgba(15, 15, 15, 0.9); }
        
        body { 
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #000; /* خلفية سوداء أساسية */
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center; overflow-x: hidden;
        }

        /* تثبيت خلفية التنين الأسود */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bg.jpg'); /* تأكد من وجود ملف bg.jpg في جيت هاب */
            background-size: cover; background-position: center;
            opacity: 0.4; filter: blur(2px); z-index: -1;
        }
        
        header { 
            width: 100%; padding: 20px 0; background: #000; 
            border-bottom: 3px solid var(--main-red); margin-bottom: 30px;
        }
        .logo { width: 110px; height: auto; margin-bottom: 10px; }
        .brand { font-size: 32px; font-weight: 900; letter-spacing: 1px; }
        .brand span { color: var(--main-red); }

        .container { width: 95%; max-width: 1200px; margin: 0 auto; }
        
        /* نظام المربعين في كل صف */
        .streams-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; padding-bottom: 50px;
        }
        
        .video-card { 
            background: var(--card-bg); border: 2px solid #222; 
            border-radius: 15px; overflow: hidden; transition: 0.3s;
        }
        .video-card:hover { border-color: var(--main-red); transform: translateY(-5px); }
        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .channel-info { 
            padding: 15px; background: rgba(0,0,0,0.8); 
            display: flex; justify-content: space-between; align-items: center; font-weight: bold;
        }
        .live-tag { color: #00ff00; display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; animation: blink 1s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        @media (max-width: 768px) { .streams-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="OLRD" class="logo" onerror="this.style.display='none'">
    <div class="brand">OLRD <span>STREAMS</span></div>
</header>

<div class="container">
    <div class="streams-grid">
        <div class="video-card">
            <div class="video-container">
                <iframe src="https://player.kick.com/yzfk?muted=true&parent=olrd-streams.pages.dev" allowfullscreen="true"></iframe>
            </div>
            <div class="channel-info">
                <span>YZFK</span>
                <span class="live-tag"><span class="dot"></span> LIVE</span>
            </div>
        </div>

        <div class="video-card">
            <div class="video-container">
                <iframe src="https://player.kick.com/ngdi?muted=true&parent=olrd-streams.pages.dev" allowfullscreen="true"></iframe>
            </div>
            <div class="channel-info">
                <span>NGDI</span>
                <span class="live-tag"><span class="dot"></span> LIVE</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
