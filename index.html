<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OLRD SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        
        #admin-panel {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 600px;
            background: #050505;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            z-index: 1000;
        }
        .streamer-manager-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            list-style: none;
            padding: 0;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .streamer-item {
            background: #111;
            border: 1px solid #222;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .streamer-actions { display: flex; gap: 5px; width: 100%; }
        .action-btn {
            flex: 1; background: #1a1a1a; border: 1px solid #333;
            color: #fff; padding: 5px; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .action-btn.delete { color: #ff4d4d; border-color: #551111; background: #200505; }
    </style>
</head>
<body>

    <h1>OLRD STREAMERS</h1>
    <ul id="streamer-list"></ul>
    <button onclick="checkAdminPassword()">EDIT</button>

    <div id="admin-panel">
        <h3>SYSTEM PREFERENCES</h3>
        <input type="text" id="new-name" placeholder="Streamer Name">
        <button onclick="addStreamer()">INSERT</button>
        <ul id="manager-list" class="streamer-manager-list"></ul>
        <button onclick="toggleAdminPanel(false)" style="margin-top:20px;">EXIT</button>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://olrd-streamers-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let users = [];

        database.ref('streamers_list').on('value', (snapshot) => {
            users = snapshot.val() || [];
            renderMainList();
            if(document.getElementById('admin-panel').style.display === 'block') renderAdminList();
        });

        function renderMainList() {
            const list = document.getElementById('streamer-list');
            list.innerHTML = users.map(u => `<li>${u}</li>`).join('');
        }

        function checkAdminPassword() {
            const password = prompt("ENTER SYSTEM PIN:");
            if (!password) return;
            database.ref('admin_secure_vault/' + password).once('value').then(s => {
                if(s.exists() && s.val() === true) toggleAdminPanel(true);
                else alert("ACCESS DENIED: INVALID PIN");
            });
        }

        function toggleAdminPanel(show) {
            document.getElementById('admin-panel').style.display = show ? 'block' : 'none';
            if(show) renderAdminList();
        }

        function renderAdminList() {
            const list = document.getElementById('manager-list');
            list.innerHTML = users.map((u, i) => `
                <li class="streamer-item">
                    <span>${u}</span>
                    <div class="streamer-actions">
                        <button class="action-btn" onclick="move(${i}, -1)">▲</button>
                        <button class="action-btn" onclick="move(${i}, 1)">▼</button>
                        <button class="action-btn delete" onclick="del(${i})">✕</button>
                    </div>
                </li>`).join('');
        }

        function addStreamer() {
            const input = document.getElementById('new-name');
            if(input.value) { users.push(input.value); input.value = ''; save(); }
        }

        function del(i) { users.splice(i, 1); save(); }

        function move(i, d) {
            const target = i + d;
            if(target >= 0 && target < users.length) {
                [users[i], users[target]] = [users[target], users[i]];
                save();
            }
        }

        function save() { database.ref('streamers_list').set(users); }
    </script>
</body>
</html>ص
