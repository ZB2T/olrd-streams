<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OLRD STREAMS | LIVE</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('bg.jpg') no-repeat center center/cover; opacity: 0.15; z-index: -1; }
        header { padding: 30px; background: rgba(0,0,0,0.9); border-bottom: 2px solid red; margin-bottom: 30px; }
        .logo { width: 80px; margin-bottom: 10px; }
        .container { width: 95%; max-width: 1400px; margin: 0 auto; padding-bottom: 50px; }
        
        /* تصميم الشبكة مثل الصورة الأولى */
        .live-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        .card { background: #0a0a0a; border: 2px solid #222; border-radius: 12px; overflow: hidden; position: relative; transition: 0.3s; }
        .card.is-live { border-color: red; box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        
        .v-wrap { position: relative; padding-bottom: 56.25%; height: 0; background: #111; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        .card-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #050505; }
        .user-name { font-weight: bold; font-size: 16px; text-transform: uppercase; }
        .live-tag { color: #00ff00; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .live-tag::before { content: ''; width: 8px; height: 8px; background: #00ff00; border-radius: 50%; }

        h2 { border-right: 5px solid red; padding-right: 15px; text-align: right; font-size: 22px; margin-bottom: 25px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <header>
        <img src="logo.png" class="logo">
        <h1 style="margin:0; font-size: 24px; letter-spacing: 2px;">OLRD <span style="color:red">STREAMS</span></h1>
    </header>

    <div class="container">
        <h2>المباشر الآن 🔴</h2>
        <div id="live-area" class="live-grid">
            </div>
    </div>

    <script>
        const users = ["lkaiiser", "evely3", "kurd1i", "yzfk", "ngdi", "d7m1-s", "iwdd", "y_3l", "ialfa", "ROMEO", "abo3th", "shanks_u", "Zb2t", "z7lion", "alarwilii", "teek0", "d4t4xi", "kr0m", "mrfarosyy", "irust", "omutx", "lunedee", "saraalnamlah", "abosaloum", "qyem", "0xcharlie", "ykoy", "fed0tb", "hitanchi", "itsenemyy", "yaasoky", "imsh4", "9lb6h", "seba0z", "nas_24", "25sniperksa", "22rahaf", "xlive1", "berlin26x", "v0lka", "qtrm7md", "gyg2", "bnshddad", "0md1", "nolizr", "aizen56", "mr20s", "ii2a"];
        const domain = "olrd-streams.pages.dev";

        async function checkChannel(u) {
            try {
                // الفحص السريع عبر البروكسي
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://kick.com/api/v1/channels/'+u)}&_=${Date.now()}`);
                const data = JSON.parse((await res.json()).contents);
                
                if (data.livestream) {
                    const area = document.getElementById('live-area');
                    area.innerHTML += `
                        <div class="card is-live">
                            <div class="v-wrap">
                                <iframe src="https://player.kick.com/${u}?muted=true&parent=${domain}"></iframe>
                            </div>
                            <div class="card-info">
                                <div class="live-tag">LIVE</div>
                                <div class="user-name">${u}</div>
                            </div>
                        </div>`;
                }
            } catch (e) {}
        }

        // تشغيل الفحص الجماعي لضمان السرعة
        users.forEach(u => checkChannel(u));

        // تحديث الصفحة كل دقيقتين للتأكد من القنوات الجديدة
        setInterval(() => location.reload(), 120000);
    </script>
</body>
</html>
