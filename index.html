<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OLRD COMMUNITY</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('bg.jpg') no-repeat center center/cover; opacity: 0.15; z-index: -1; }
        header { padding: 20px; background: rgba(0,0,0,0.9); border-bottom: 3px solid red; }
        .logo { width: 70px; }
        .container { width: 95%; max-width: 1400px; margin: 0 auto; padding: 20px; }
        .section-title { font-size: 24px; font-weight: bold; margin: 30px 0; color: red; text-align: right; border-right: 4px solid red; padding-right: 15px; }
        
        /* المباشر (فيديو) */
        .live-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; }
        .card { background: #0a0a0a; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        .v-wrap { position: relative; padding-bottom: 56.25%; height: 0; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        /* القنوات (بطاقات خفيفة) */
        .ch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .ch-item { background: #111; padding: 15px; border-radius: 10px; text-decoration: none; color: #fff; border: 1px solid #222; transition: 0.3s; }
        .ch-item:hover { background: red; transform: translateY(-5px); }
    </style>
</head>
<body>
    <div class="bg"></div>
    <header>
        <img src="logo.png" class="logo" onerror="this.style.display='none'">
        <h1 style="margin:5px 0; font-size: 22px;">OLRD <span style="color:red">COMMUNITY</span></h1>
    </header>
