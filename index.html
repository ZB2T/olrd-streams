<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLRD STREAMS</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        .bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('bg.jpg') no-repeat center center/cover; 
            opacity: 0.2; z-index: -1; 
        }
        header { padding: 20px; text-align: center; border-bottom: 2px solid red; background: rgba(0,0,0,0.8); }
        .logo { width: 80px; display: block; margin: 0 auto 10px; }
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 20px; padding: 20px; max-width: 1300px; margin: 0 auto; 
        }
        .card { background: #111; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
        .v-container { position: relative; padding-bottom: 56.25%; height: 0; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .footer { padding: 10px; font-weight: bold; background: #000; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <header>
        <img src="logo.png" class="logo" onerror="this.style.display='none'">
        <div style="font-size: 24px;">OLRD <span style="color:red">STREAMS</span></div>
    </header>

    <div class="grid">
        <div class="card">
            <div class="v-container"><iframe src="https://player.kick.com/yzfk?parent=olrd-streams.pages.dev"></iframe></div>
            <div class="footer"><span>YZFK</span><span style="color:lime">● LIVE</span></div>
        </div>
        <div class="card">
            <div class="v-container"><iframe src="https://player.kick.com/ngdi?parent=olrd-streams.pages.dev"></iframe></div>
            <div class="footer"><span>NGDI</span><span style="color:lime">● LIVE</span></div>
        </div>
        <div class="card">
            <div class="v-container"><iframe src="https://player.kick.com/lkaiiser?parent=olrd-streams.pages.dev"></iframe></div>
            <div class="footer"><span>LKAIISER</span><span style="color:lime">● LIVE</span></div>
        </div>
        <div class="card">
            <div class="v-container"><iframe src="https://player.kick.com/kurd1i?parent=olrd-streams.pages.dev"></iframe></div>
            <div class="footer"><span>KURD1I</span><span style="color:lime">● LIVE</span></div>
        </div>
        <div class="card">
            <div class="v-container"><iframe src="https://player.kick.com/evely3?parent=olrd-streams.pages.dev"></iframe></div>
            <div class="footer"><span>EVELY3</span><span style="color:lime">● LIVE</span></div>
        </div>
    </div>
</body>
</html>
