<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OLRD STREAMRS | LIVE</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('bg.jpg') no-repeat center center/cover; opacity: 0.15; z-index: -1; }
        header { padding: 20px; background: rgba(0,0,0,0.9); border-bottom: 2px solid red; }
        .container { padding: 20px; }
        .live-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: #0a0a0a; border: 1px solid red; border-radius: 10px; overflow: hidden; padding-bottom: 10px; }
        iframe { width: 100%; aspect-ratio: 16/9; border: 0; }
        .ch-item { display: inline-block; background: #111; padding: 8px; margin: 4px; border-radius: 5px; color: #ccc; text-decoration: none; border: 1px solid #333; font-size: 12px; }
        .is-live { border-color: red !important; color: white !important; font-weight: bold; background: #900; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <header><h1>OLRD <span style="color:red">LIVE</span></h1></header>
    <div class="container">
        <h2 style="text-align: right;">المباشر الآن 🔴</h2>
        <div id="live-area" class="live-grid">جاري فحص القنوات...</div>
        <hr style="border: 0; border-top: 1px solid #222; margin: 40px 0;">
        <h2 style="text-align: right;">كل القنوات 📋</h2>
        <div id="list-area"></div>
    </div>

    <script>
        const users = ["lkaiiser", "evely3", "kurd1i", "yzfk", "ngdi", "d7m1-s", "iwdd", "y_3l", "ialfa", "ROMEO", "abo3th", "shanks_u", "Zb2t", "z7lion", "alarwilii", "teek0", "d4t4xi", "kr0m", "mrfarosyy", "irust", "omutx", "lunedee", "saraalnamlah", "abosaloum", "qyem", "0xcharlie", "ykoy", "fed0tb", "hitanchi", "itsenemyy", "yaasoky", "imsh4", "9lb6h", "seba0z", "nas_24", "25sniperksa", "22rahaf", "xlive1", "berlin26x", "v0lka", "qtrm7md", "gyg2", "bnshddad", "0md1", "nolizr", "aizen56", "mr20s", "ii2a"];
        
        async function checkChannel(user) {
            try {
                // نستخدم بروكسي مجاني وسريع جداً يتخطى حماية كيك
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://kick.com/api/v1/channels/'+user)}`);
                const out = await res.json();
                const data = JSON.parse(out.contents);
                
                if (data.livestream) {
                    const area = document.getElementById('live-area');
                    if (area.innerText.includes("جاري")) area.innerHTML = "";
                    area.innerHTML += `
                        <div class="card">
                            <iframe src="https://player.kick.com/${user}?muted=true&parent=olrd-streams.pages.dev"></iframe>
                            <div style="margin-top:10px;">${user.toUpperCase()} - مباشر حالياً</div>
                        </div>`;
                    document.getElementById(`btn-${user}`).classList.add('is-live');
                }
            } catch (e) {}
        }

        // بناء القائمة
        const listArea = document.getElementById('list-area');
        users.sort().forEach(u => {
            listArea.innerHTML += `<a href="https://kick.com/${u}" id="btn-${u}" target="_blank" class="ch-item">${u.toUpperCase()}</a>`;
        });

        // فحص الجميع
        users.forEach(u => checkChannel(u));
    </script>
</body>
</html>
