<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLRD STREAMS | OFFICIAL PLATFORM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; 
            overflow-x: hidden; 
        }

        /* الخلفية الموزونة المتحركة */
        .bg { 
            position: fixed; 
            top: -100%; 
            left: -100%; 
            width: 300%; 
            height: 300%; 
            background: url('bg.jpg') repeat; 
            background-size: 350px; 
            opacity: 0.12; 
            z-index: -1; 
            animation: rotateBg 60s linear infinite; 
        }

        @keyframes rotateBg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h1, .splash-text, .selection-title, .category-box, .admin-title {
            font-family: 'Cinzel', serif;
        }

        /* 1. شاشة الترحيب */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 1s ease-in-out;
        }
        .splash-text {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: #fff;
            animation: fadeIn 1.5s ease-in-out forwards;
        }
        .splash-text span { color: red; }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 2. شاشة اختيار الأقسام (الرئيسية) */
        #main-selection {
            display: none;
            height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            position: relative;
        }
        .selection-title { font-size: 28px; margin-bottom: 40px; letter-spacing: 4px; color: #aaa; font-weight: 700; }
        
        .categories-container {
            display: flex;
            gap: 40px;
            width: 90%;
            max-width: 1200px;
            justify-content: center;
        }
        .category-box {
            flex: 1;
            aspect-ratio: 1 / 1;
            max-width: 400px;
            background: rgba(10, 10, 10, 0.85);
            border: 2px solid #222;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.4s ease;
            text-decoration: none;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .category-box:hover {
            border-color: red;
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
            background: rgba(20, 5, 5, 0.9);
        }
        .category-box span { color: red; margin-left: 5px; }

        /* 3. واجهات الأقسام الداخلية */
        #streamers-section, #story-section { display: none; padding-bottom: 50px; }
        
        /* هيدر شفاف أنيق بدون السواد المصمت */
        header { 
            padding: 30px; 
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 3px solid red; 
            margin-bottom: 40px; 
            position: relative; 
        }
        .logo { width: 80px; margin-bottom: 10px; }
        .back-btn { 
            position: absolute; top: 35px; right: 5%; 
            background: #111; border: 1px solid #333; color: #fff; 
            padding: 10px 20px; border-radius: 5px; cursor: pointer; 
            transition: 0.3s; font-family: 'Montserrat', sans-serif; font-weight: bold;
        }
        .back-btn:hover { background: red; border-color: red; }
        
        .container { width: 95%; max-width: 1600px; margin: 0 auto; }
        .live-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .card-link { text-decoration: none; display: block; }
        
        .card { 
            position: relative;
            background: #000; 
            border: 1px solid #222; 
            border-radius: 12px; 
            overflow: hidden; 
            transition: 0.3s; 
            cursor: pointer; 
        }
        .card:hover { border-color: red; transform: scale(1.02); }
        .v-wrap { position: relative; padding-bottom: 56.25%; height: 0; background: #111; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        .card-info { 
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(0, 0, 0, 0.65); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }
        
        .user-name { font-weight: 700; font-size: 13px; text-transform: uppercase; color: #ffffff !important; text-decoration: none !important; letter-spacing: 1px; }
        .live-tag { color: #00ff00; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .live-tag::before { content: ''; width: 8px; height: 8px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 5px #00ff00; }

        /* ستايل الحقوق الجديد في الصفحة الرئيسية */
        .footer-credit { 
            margin: 40px auto 15px auto; 
            width: fit-content; 
            min-width: 250px; 
            padding: 12px 35px; 
            background: rgba(255, 0, 0, 0.08); 
            border: 1px solid rgba(255, 0, 0, 0.5); 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 13px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            color: #fff; 
        }

        /* زر التعديل الخاص بالمالك */
        .admin-toggle-btn {
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid #333; 
            color: #888; 
            font-size: 12px; 
            font-weight: bold;
            cursor: pointer; 
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 5px; 
            transition: 0.3s;
        }
        .admin-toggle-btn:hover { color: #fff; background: red; border-color: red; }

        /* نافذة لوحة التحكم */
        #admin-panel {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 600px; max-height: 80vh;
            background: #0a0a0a; border: 2px solid red; border-radius: 15px;
            z-index: 10000; padding: 25px; box-shadow: 0 0 30px rgba(0,0,0,0.9);
            overflow-y: auto; text-align: right; direction: rtl;
        }
        .admin-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index: 9999; }
        .admin-title { text-align: center; color: red; font-size: 20px; margin-bottom: 20px; letter-spacing: 1px; }
        .admin-input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .admin-input { flex: 1; padding: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; font-family: sans-serif; text-align: right; }
        .admin-btn { background: red; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .admin-btn.export { background: #d4af37; color: #000; width: 100%; margin-top: 15px; font-weight: 900; }
        .admin-btn.close { background: #333; margin-top: 10px; width: 100%; }
        .streamer-manager-list { list-style: none; padding: 0; margin: 0; }
        .streamer-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #151515; border: 1px solid #222; margin-bottom: 8px; border-radius: 5px; }
        .streamer-actions { display: flex; gap: 5px; }
        .action-btn { background: #222; color: #fff; border: 1px solid #444; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .action-btn.delete { background: rgba(255,0,0,0.2); border-color: red; color: red; }
    </style>
</head>
<body>
    <div class="bg"></div>

    <!-- 1. شاشة الترحيب -->
    <div id="splash-screen">
        <div class="splash-text">WELCOME TO <span>OLRD STREAMS</span></div>
    </div>

    <!-- 2. شاشة الاختيار الرئيسية -->
    <div id="main-selection">
        <div class="selection-title">SELECT CATEGORY</div>
        <div class="categories-container">
            <div class="category-box" onclick="showSection('streamers')">STREAMERS</div>
            <div class="category-box" onclick="showSection('story')">STORY <span>BOOK</span></div>
        </div>
        
        <!-- الحقوق والزر الخاص بالمالك -->
        <div class="footer-credit">CREATED BY ZB2T</div>
        <button class="admin-toggle-btn" onclick="checkAdminPassword()">تعديل القائمة (خاص بالمالك)</button>
    </div>

    <!-- 3. قسم الاستريمرز -->
    <div id="streamers-section">
        <header>
            <button class="back-btn" onclick="showSelectionPage()">رجوع</button>
            <img src="logo.png" class="logo">
            <h1 style="margin:0;">OLRD <span style="color:red">STREAMS</span></h1>
        </header>
        <div class="container">
            <div id="main-grid" class="live-grid"></div>
        </div>
    </div>

    <!-- 4. قسم كتاب القصة -->
    <div id="story-section">
        <header>
            <button class="back-btn" onclick="showSelectionPage()">رجوع</button>
            <img src="logo.png" class="logo">
            <h1 style="margin:0;">STORY <span style="color:red">BOOK</span></h1>
        </header>
        <div class="container" style="padding-top: 100px;">
            <h2 style="font-size: 2.5rem; letter-spacing: 2px; font-family: 'Cinzel', serif;">STORY BOOK SECTION</h2>
            <p style="color: #666; font-size: 1.2rem;">قريباً.. هنا بنرتب أحداث وقصص السيرفر الفخمة.</p>
        </div>
    </div>

    <!-- لوحة تحكم المالك المنبثقة المحمية -->
    <div class="admin-overlay" id="admin-overlay" onclick="toggleAdminPanel(false)"></div>
    <div id="admin-panel">
        <div class="admin-title">OLRD OWNER PANEL</div>
        <p style="font-size: 13px; color: #aaa; text-align: center; margin-top:-10px;">تحكم كامل بالترتيب والإضافة والحذف</p>
        
        <div class="admin-input-group">
            <input type="text" id="new-streamer-input" class="admin-input" placeholder="اسم حساب الاستريمر في Kick (مثال: ii2a)">
            <button class="admin-btn" onclick="addStreamer()">إضافة</button>
        </div>

        <ul class="streamer-manager-list" id="manager-list">
            <!-- تحميل الأسماء تلقائياً -->
        </ul>

        <button class="admin-btn export" onclick="exportNewCode()">⚡ نسخ الكود النهائي للموقع</button>
        <button class="admin-btn close" onclick="toggleAdminPanel(false)">إغلاق اللوحة</button>
    </div>

    <script>
        // الرمز السري الخاص بك لتعديل القائمة (تقدر تغيره من هنا)
        const OWNER_PIN = "5364";

        // قائمة الاستريمرز الأساسية المعتمدة
        const defaultUsers = [
            "ii2a", "qyem", "fed0tb", "shanks_u", "evely3", "lkaiiser", "d4t4xi", "kurd1i", 
            "ialfa", "irust", "lunedee", "ROMEO", "z7lion", "saraalnamlah", "mrfarosyy", "yzfk", 
            "Zb2t", "abosaloum", "ngdi", "abo3th", "nolizr", "iitalal7", "kr0m", "seba0z", "teek0", 
            "iwdd", "y_3li", "d7m1-s", "yaasoky", "imsh4", "0xcharlie", "25sniperksa", "22rahaf", 
            "0md1", "hitanchi", "9lb6h", "elbulldozer", "berlin26x", "gyg2", "mr20s", "aizen56", 
            "iicloud", "alarwilii", "icq50", "xlive1", "nas_24", "ithanos", "alahmady03", "ykoy", 
            "itsenemyy", "iiw2le", "omutx", "v0lka", "qtrm7md", "1nxe", "bnshddad"
        ];

        let users = JSON.parse(localStorage.getItem('olrd_streamers')) || defaultUsers;
        const host = window.location.hostname;
        const grid = document.getElementById('main-grid');

        function renderGrid() {
            grid.innerHTML = "";
            users.forEach(u => {
                grid.innerHTML += `
                    <div class="card-link">
                        <div class="card">
                            <div class="v-wrap">
                                <iframe src="https://player.kick.com/${u}?muted=true&parent=${host}" allowfullscreen="true" scrolling="no" loading="lazy"></iframe>
                            </div>
                            <a href="https://kick.com/${u}" target="_blank" style="text-decoration:none;">
                                <div class="card-info">
                                    <div class="live-tag">LIVE</div>
                                    <div class="user-name">${u}</div>
                                </div>
                            </a>
                        </div>
                    </div>`;
            });
        }

        function renderAdminList() {
            const list = document.getElementById('manager-list');
            list.innerHTML = "";
            users.forEach((u, index) => {
                list.innerHTML += `
                    <li class="streamer-item">
                        <span style="font-weight:bold; font-family:sans-serif;">${u}</span>
                        <div class="streamer-actions">
                            <button class="action-btn" onclick="moveStreamer(${index}, -1)">⬆</button>
                            <button class="action-btn" onclick="moveStreamer(${index}, 1)">⬇</button>
                            <button class="action-btn delete" onclick="deleteStreamer(${index})">حذف</button>
                        </div>
                    </li>`;
            });
        }

        // دالة التحقق من الرمز السري عند الضغط على زر التعديل
        function checkAdminPassword() {
            const password = prompt("الرجاء إدخال الرقم السري الخاص بالمالك لفتح التعديل:");
            if (password === OWNER_PIN) {
                toggleAdminPanel(true);
            } else if (password !== null) {
                alert("الرمز السري خاطئ! لا تملك صلاحية التعديل.");
            }
        }

        function toggleAdminPanel(show) {
            document.getElementById('admin-panel').style.display = show ? 'block' : 'none';
            document.getElementById('admin-overlay').style.display = show ? 'block' : 'none';
            if (show) renderAdminList();
        }

        function addStreamer() {
            const input = document.getElementById('new-streamer-input');
            const name = input.value.trim();
            if(name) {
                users.unshift(name);
                input.value = "";
                saveAndRefresh();
            }
        }

        function deleteStreamer(index) {
            if(confirm("هل أنت متأكد من حذف هذا الاستريمر من القائمة؟")) {
                users.splice(index, 1);
                saveAndRefresh();
            }
        }

        function moveStreamer(index, direction) {
            const targetIndex = index + direction;
            if (targetIndex >= 0 && targetIndex < users.length) {
                const temp = users[index];
                users[index] = users[targetIndex];
                users[targetIndex] = temp;
                saveAndRefresh();
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('olrd_streamers', JSON.stringify(users));
            renderGrid();
            renderAdminList();
        }

        // دالة المالك الذكية لنسخ الترتيب النهائي بضغطة زر
        function exportNewCode() {
            const codeString = JSON.stringify(users);
            navigator.clipboard.writeText(codeString).then(() => {
                alert("تم نسخ كود الترتيب الجديد بنجاح! أرسل السطر المنسوخ لـ Gemini بالشات لتحديث الموقع للجميع فوراً.");
            }).catch(err => {
                alert("حدث خطأ أثناء النسخ التلقائي، يمكنك تصوير الشاشة.");
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderGrid();
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const selection = document.getElementById('main-selection');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    selection.style.display = 'flex';
                    setTimeout(() => { selection.style.opacity = '1'; }, 50);
                }, 1000);
            }, 3000);
        });

        function showSection(section) {
            document.getElementById('main-selection').style.display = 'none';
            if(section === 'streamers') {
                document.getElementById('streamers-section').style.display = 'block';
            } else if(section === 'story') {
                document.getElementById('story-section').style.display = 'block';
            }
        }

        function showSelectionPage() {
            document.getElementById('streamers-section').style.display = 'none';
            document.getElementById('story-section').style.display = 'none';
            const selection = document.getElementById('main-selection');
            selection.style.display = 'flex';
            selection.style.opacity = '1';
        }
    </script>
</body>
</html>
