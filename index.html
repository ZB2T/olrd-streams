<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLRD COMMUNITY</title>
    <style>
        :root { --main-red: #ff0000; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('bg.jpg') no-repeat center center/cover; opacity: 0.15; z-index: -1; }
        header { padding: 25px; background: rgba(0,0,0,0.9); border-bottom: 3px solid var(--main-red); position: sticky; top: 0; z-index: 100; }
        .logo { width: 70px; }
        
        .section-title { font-size: 26px; font-weight: bold; margin: 40px 0 20px; color: #fff; border-right: 5px solid var(--main-red); padding-right: 15px; display: inline-block; }
        
        .container { width: 95%; max-width: 1500px; margin: 0 auto; padding-bottom: 80px; }
        
        /* شبكة البث المباشر (فيديوهات) */
        .live-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .live-card { background: #0a0a0a; border: 1px solid #333; border-radius: 12px; overflow: hidden; box-shadow: 0 0 20px rgba(255,0,0,0.15); }
        .v-wrap { position: relative; padding-bottom: 56.25%; height: 0; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* شبكة القنوات (بطاقات خفيفة) */
        .channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .channel-item { 
            background: rgba(20,20,20,0.8); border: 1px solid #222; padding: 15px; 
            border-radius: 10px; text-decoration: none; color: white; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center;
        }
        .channel-item:hover { background: var(--main-red); transform: translateY(-5px); }
        .avatar { width: 60px; height: 60px; background: #333; border-radius: 50%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }

        @media (max-width: 500px) { .live-grid { grid-template-columns: 1fr; } }
    </style>
</head>
