<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLRD STREAMS | LIVE</title>
    <style>
        :root { --main-red: #ff0000; --card-bg: rgba(15, 15, 15, 0.85); }
        
        body { 
            margin: 0; padding-bottom: 50px; text-align: center; color: white;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000; /* لون احتياطي */
            position: relative; 
            min-height: 100vh;
        }

        /* طبقة الخلفية مخصصة للصورة الجديدة */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* تأكد من رفع صورة التنين الأسود باسم bg.jpg */
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.5; /* درجة وضوح الخلفية (0.5 تعني شفافة شوي عشان ما تزعج العين) */
            filter: blur(3px); /* تغبيش خفيف يعطي فخامة */
            z-index: -1;
        }
        
        header { 
            width: 100%; padding: 20px 0; background: rgba(0,0,0,0.9); 
            border-bottom: 2px solid var(--main-red); margin-bottom: 30px; 
        }
        .logo { width: 110px; filter: drop-shadow(0 0 10px rgba(255,0,0,0.5)); }
        .brand { font-size: 32px; font-weight: 900; text-transform: uppercase; margin: 5px 0; }
        .brand span { color: var(--main-red); }

        .container { width: 95%; max-width: 1300px; margin: 0 auto; }
        .streams-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        
        .video-card { 
            background: var(--card-bg); border: 1px solid #333; 
            border-radius: 12px; overflow: hidden; transition: 0.3s; 
            backdrop-filter: blur(5px); /* يخلي المربعات فيها شفافية زجاجية */
        }
        .video-card:hover { border-color: var(--main-red); transform: scale(1.01); }
        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .channel-info { 
            padding: 12px; font-weight: bold; background: rgba(0,0,0,0.8); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .live-tag { color: #00ff00; font-size: 14px; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        @media (max-width: 768px) {
            .streams-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
