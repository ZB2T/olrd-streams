<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OLRD COMMUNITY</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        /* الخلفية (التنين) */
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('bg.jpg') no-repeat center center/cover; opacity: 0.15; z-index: -1; }
        header { padding: 20px; background: rgba(0,0,0,0.9); border-bottom: 3px solid red; }
        .logo { width: 70px; }
        .container { width: 95%; max-width: 1400px; margin: 0 auto; padding: 20px; }
        .section-title { font-size: 24px; font-weight: bold; margin: 30px 0; color: red; text-align: right; border-right: 4px solid red; padding-right: 15px; }
        
        /* شبكة المباشر (فيديو) */
        .live-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; }
        .card { background: #0a0a0a; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        .v-wrap { position: relative; padding-bottom: 56.25%; height: 0; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        /* شبكة القنوات (أزرار خفيفة) */
        .ch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .ch-item { background: #111; padding: 12px; border-radius: 8px; text-decoration: none; color: #fff; border: 1px solid #222; font-weight: bold; transition: 0.2s; }
        .ch-item:hover { background: red; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <header>
        <img src="logo.png" class="logo" onerror="this.style.display='none'">
        <h1 style="margin:5px 0; font-size: 22px;">OLRD <span style="color:red">COMMUNITY</span></h1>
    </header>

    <div class="container">
        <div class="section-title">المباشر الآن 🔴</div>
        <div class="live-grid">
            <div class="card">
                <div class="v-wrap"><iframe src="https://player.kick.com/ngdi?muted=true&parent=olrd-streams.pages.dev"></iframe></div>
                <div style="padding:10px;">NGDI</div>
            </div>
            <div class="card">
                <div class="v-wrap"><iframe src="https://player.kick.com/yzfk?muted=true&parent=olrd-streams.pages.dev"></iframe></div>
                <div style="padding:10px;">YZFK</div>
            </div>
        </div>

        <hr style="margin: 50px 0; border: 0; border-top: 1px solid #222;">

        <div class="section-title">قائمة القنوات 📋</div>
        <div class="ch-grid">
            <a href="https://kick.com/lkaiiser" target="_blank" class="ch-item">LKAIISER</a>
            <a href="https://kick.com/evely3" target="_blank" class="ch-item">EVELY3</a>
            <a href="https://kick.com/kurd1i" target="_blank" class="ch-item">KURD1I</a>
            <a href="https://kick.com/d7m1-s" target="_blank" class="ch-item">D7M1-S</a>
            <a href="https://kick.com/iwdd" target="_blank" class="ch-item">IWDD</a>
            <a href="https://kick.com/y_3l" target="_blank" class="ch-item">Y_3L</a>
            <a href="https://kick.com/ROMEO" target="_blank" class="ch-item">ROMEO</a>
            </div>
    </div>
</body>
</html>
