<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="s-sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#101015"/>
            <stop offset="0.55" stop-color="#0a0709"/>
            <stop offset="1" stop-color="#050406"/>
        </linearGradient>
        <radialGradient id="s-glow" cx="0.5" cy="0.96" r="0.75">
            <stop offset="0" stop-color="#b21420" stop-opacity="0.6"/>
            <stop offset="0.45" stop-color="#5e0a10" stop-opacity="0.28"/>
            <stop offset="1" stop-color="#5e0a10" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="s-vig" cx="0.5" cy="0.46" r="0.72">
            <stop offset="0.5" stop-color="#000000" stop-opacity="0"/>
            <stop offset="1" stop-color="#000000" stop-opacity="0.88"/>
        </radialGradient>
        <linearGradient id="s-rim" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#f2493d"/>
            <stop offset="1" stop-color="#6f0e15"/>
        </linearGradient>
        <filter id="s-soft" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="9"/>
        </filter>
        <filter id="s-grain">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
            <feColorMatrix type="saturate" values="0"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.09"/></feComponentTransfer>
        </filter>
        <pattern id="s-scan" width="3" height="3" patternUnits="userSpaceOnUse">
            <rect width="3" height="1" fill="#000000" opacity="0.32"/>
        </pattern>
    </defs>

    <rect width="800" height="600" fill="url(#s-sky)"/>
    <rect width="800" height="600" fill="url(#s-glow)"/>

    <g fill="none" stroke-linecap="round">
        <circle cx="400" cy="158" r="74" stroke="#c81a26" stroke-width="2" opacity="0.5"/>
        <circle cx="400" cy="158" r="126" stroke="#c81a26" stroke-width="2" opacity="0.3"/>
        <circle cx="400" cy="158" r="182" stroke="#c81a26" stroke-width="2" opacity="0.16"/>
    </g>

    <path d="M250 506 L390 506 L372 168 L368 168 Z" fill="#060507"/>
    <path d="M550 506 L410 506 L428 168 L432 168 Z" fill="#0a0a0d"/>
    <path d="M410 506 L428 168 L432 168 L432 168 Z" fill="url(#s-rim)" opacity="0.55"/>
    <g stroke="#101014" stroke-width="6">
        <path d="M375 440 L425 440"/>
        <path d="M380 372 L420 372"/>
        <path d="M384 308 L416 308"/>
        <path d="M388 246 L412 246"/>
    </g>
    <g stroke="#1c1c22" stroke-width="3">
        <path d="M372 506 L425 440 L378 372 L420 308 L385 246 L412 200"/>
        <path d="M428 506 L375 440 L422 372 L380 308 L415 246 L388 200"/>
    </g>

    <circle cx="400" cy="158" r="30" fill="#b21420" opacity="0.65" filter="url(#s-soft)"/>
    <circle cx="400" cy="158" r="8" fill="#ff5a3c"/>
    <circle cx="400" cy="155" r="3" fill="#ffe3d8"/>

    <path d="M150 512 L400 470 L660 512 L660 600 L150 600 Z" fill="#040305"/>
    <path d="M150 512 L400 470 L660 512" fill="none" stroke="#7a0f17" stroke-width="2" opacity="0.6"/>

    <rect width="800" height="600" fill="url(#s-scan)"/>
    <rect width="800" height="600" fill="url(#s-vig)"/>
    <rect x="14" y="14" width="772" height="572" fill="none" stroke="#b21420" stroke-width="1" opacity="0.32"/>
    <rect width="800" height="600" filter="url(#s-grain)" opacity="0.6"/>
</svg>
