<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="b-bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#121117"/>
            <stop offset="0.6" stop-color="#0a080b"/>
            <stop offset="1" stop-color="#050406"/>
        </linearGradient>
        <radialGradient id="b-spot" cx="0.42" cy="0.28" r="0.7">
            <stop offset="0" stop-color="#b21420" stop-opacity="0.4"/>
            <stop offset="0.5" stop-color="#5e0a10" stop-opacity="0.16"/>
            <stop offset="1" stop-color="#5e0a10" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="b-leather" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#241319"/>
            <stop offset="0.5" stop-color="#170d11"/>
            <stop offset="1" stop-color="#0c0709"/>
        </linearGradient>
        <linearGradient id="b-page" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#cfc6b2"/>
            <stop offset="0.5" stop-color="#a89a82"/>
            <stop offset="1" stop-color="#5c5345"/>
        </linearGradient>
        <linearGradient id="b-seal" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#e0303a"/>
            <stop offset="1" stop-color="#7c0f18"/>
        </linearGradient>
        <radialGradient id="b-vig" cx="0.5" cy="0.46" r="0.74">
            <stop offset="0.52" stop-color="#000000" stop-opacity="0"/>
            <stop offset="1" stop-color="#000000" stop-opacity="0.9"/>
        </radialGradient>
        <filter id="b-soft" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="14"/>
        </filter>
        <filter id="b-grain">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
            <feColorMatrix type="saturate" values="0"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.09"/></feComponentTransfer>
        </filter>
    </defs>

    <rect width="800" height="600" fill="url(#b-bg)"/>
    <rect width="800" height="600" fill="url(#b-spot)"/>

    <ellipse cx="404" cy="498" rx="208" ry="40" fill="#000000" opacity="0.6" filter="url(#b-soft)"/>

    <path d="M300 150 L520 150 L540 168 L540 478 L320 478 L300 460 Z" fill="url(#b-page)" opacity="0.92"/>
    <g stroke="#3c3527" stroke-width="1" opacity="0.5">
        <path d="M524 174 L524 472"/>
        <path d="M529 172 L529 470"/>
        <path d="M534 170 L534 468"/>
    </g>

    <rect x="292" y="150" width="216" height="312" fill="url(#b-leather)"/>
    <path d="M292 150 L508 150 L508 158 L300 158 Z" fill="#3a2129" opacity="0.7"/>
    <path d="M292 150 L300 150 L300 462 L292 462 Z" fill="#070406" opacity="0.9"/>

    <rect x="306" y="166" width="188" height="280" fill="none" stroke="#4a2a31" stroke-width="1.5" opacity="0.8"/>
    <rect x="313" y="173" width="174" height="266" fill="none" stroke="#2c181d" stroke-width="1" opacity="0.7"/>

    <g stroke="#b9ad97" stroke-width="2.4" fill="none" opacity="0.85">
        <path d="M300 176 L300 158 L318 158"/>
        <path d="M500 176 L500 158 L482 158"/>
        <path d="M300 436 L300 454 L318 454"/>
        <path d="M500 436 L500 454 L482 454"/>
    </g>

    <circle cx="400" cy="306" r="52" fill="#3a0c12"/>
    <circle cx="400" cy="304" r="50" fill="url(#b-seal)"/>
    <circle cx="400" cy="304" r="50" fill="none" stroke="#48070d" stroke-width="2"/>
    <circle cx="400" cy="304" r="41" fill="none" stroke="#5a0b12" stroke-width="1.5" opacity="0.7"/>
    <path d="M400 276 L420 304 L400 332 L380 304 Z" fill="#7c0f18"/>
    <path d="M400 282 L414 304 L400 326 L386 304 Z" fill="#e0303a" opacity="0.55"/>
    <circle cx="392" cy="294" r="11" fill="#ffffff" opacity="0.12"/>

    <path d="M292 150 L508 150" stroke="#7a3b44" stroke-width="2" opacity="0.6"/>
    <path d="M292 150 L292 462" stroke="#1a0f13" stroke-width="2" opacity="0.8"/>

    <g fill="#cfc6b2">
        <circle cx="206" cy="196" r="1.6" opacity="0.5"/>
        <circle cx="612" cy="250" r="1.3" opacity="0.4"/>
        <circle cx="250" cy="392" r="1.1" opacity="0.35"/>
        <circle cx="592" cy="420" r="1.5" opacity="0.45"/>
        <circle cx="168" cy="320" r="1" opacity="0.3"/>
    </g>

    <rect width="800" height="600" fill="url(#b-vig)"/>
    <rect x="14" y="14" width="772" height="572" fill="none" stroke="#b21420" stroke-width="1" opacity="0.32"/>
    <rect width="800" height="600" filter="url(#b-grain)" opacity="0.55"/>
</svg>
